name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: spin up the full backend stack, generate TypeScript types from the
  # live API docs endpoints, then lint + build the Next.js frontend.
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Types, Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Create .env files from examples and initialize frontend/.env
        run: |
          cp infra/.env.example           infra/.env
          cp infra/postgres/.env.example  infra/postgres/.env
          cp infra/redis/.env.example     infra/redis/.env
          cp backend/transcend/.env.example backend/transcend/.env
          # Type-gen scripts source frontend/.env for BACKEND_URL.
          # In CI the backend's published port is 5001 (host-accessible).
          echo "BACKEND_URL=http://localhost:5001"     > frontend/.env
          echo "NEXT_PUBLIC_WS_URL=http://localhost:5001/ws" >> frontend/.env

      - name: Set up Docker Buildx Cache
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/transcend/Dockerfile
          load: true
          tags: transcend-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start infrastructure (postgres + redis)
        run: docker compose up -d --wait db redis

      - name: Start backend
        run: docker compose up -d --wait backend
        timeout-minutes: 5

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate API types
        working-directory: frontend
        # Fetches OpenAPI spec from /api-docs and AsyncAPI spec from /springwolf/docs
        # then writes app/types/api.d.ts and app/types/asyncapi.d.ts
        run: npm run generate:all

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Show backend logs on failure
        if: failure()
        run: docker compose logs backend

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: run the Spring Boot test suite.
  # ──────────────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Create .env files from examples
        run: |
          cp infra/.env.example           infra/.env
          cp infra/postgres/.env.example  infra/postgres/.env
          cp infra/redis/.env.example     infra/redis/.env
          cp backend/transcend/.env.example backend/transcend/.env
          cp backend/.env.example backend/.env
      - name: Start infrastructure
        working-directory: infra
        run: make

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle
      - name: Run backend tests in docker
        working-directory: backend
        run: make test