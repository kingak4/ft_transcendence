services:
  backend:
    container_name: transcend-backend
    build:
      context: .
      dockerfile: transcend/Dockerfile
    env_file:
      - transcend/.env
    ports:
      - "5001:5000"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - POSTGRES_HOST=postgres-db
      - REDIS_HOST=redis-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  backend-test:
    container_name: transcend-backend-test
    build:
      context: .
      dockerfile: transcend/Dockerfile.test
    env_file:
      - transcend/.env
    environment:
      - SPRING_PROFILES_ACTIVE=test,dev
      - POSTGRES_HOST=postgres-db
      - REDIS_HOST=redis-db
    command: ["sh", "-c", "gradle test --no-daemon"]
    profiles:
      - test

networks:
  default:
    external: true
    name:  transcend-net