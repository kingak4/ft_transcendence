services:
  backend-test:
    container_name: transcend-backend-test
    build:
      context: .
      dockerfile: transcend/Dockerfile.test
    env_file:
      - transcend/.env
    environment:
      - SPRING_PROFILES_ACTIVE=test
    command: ["sh", "-c", "sleep 5 && gradle test --no-daemon"]

  backend:
    container_name: transcend-backend
    build:
      context: .
      dockerfile: transcend/Dockerfile
    env_file:
      - transcend/.env
    ports:
      - "5001:5000"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    depends_on:
      backend-test:
        condition: service_completed_successfully
    restart: unless-stopped

networks:
  default:
    external: true
    name: postgres_app_network