services:
  backend:
    container_name: transcend-backend
    build:
      context: .
      dockerfile: transcend/Dockerfile
    env_file:
      - transcend/.env
    ports:
      - "5001:5000"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    restart: unless-stopped

  backend-test:
    container_name: transcend-backend-test
    build:
      context: .
      dockerfile: transcend/Dockerfile.test
    env_file:
      - transcend/.env
    environment:
      - SPRING_PROFILES_ACTIVE=test
      - POSTGRES_HOST=postgres-db
    command: ["sh", "-c", "sleep 5 && gradle test --no-daemon"]
    profiles:
      - test

networks:
  default:
    name: transcend-net
    driver: bridge