services:
  structurizr:
    build:
      context: .
      dockerfile: Dockerfile.volume
    user: "0:0"
    container_name: structurizr
    env_file:
      - .env
    ports:
      - "${STRUCTURIZR_PORT}:8080"
    restart: unless-stopped
    volumes:
      - ./data:/usr/local/structurizr
    environment:
      ENCRYPTION_PASSPHRASE: ${ENCRYPTION_PASSPHRASE}
      STRUCTURIZR_REMOTE: ${STRUCTURIZR_REMOTE}
      STRUCTURIZR_DEBUG: true
    command: ${STRUCTURIZR_MODE}