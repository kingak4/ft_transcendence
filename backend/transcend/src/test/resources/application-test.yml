spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:5432/${POSTGRES_DB}?sslmode=disable&currentSchema=test
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: test

  liquibase:
    enabled: true
    drop-first: true
    change-log: classpath:changelog/db.changelog-master.yaml
    default-schema: test
    parameters:
      schemaName: test

bucket4j:
  enabled: false

logging:
  level:
    org:
      springframework:
        messaging:
          TRACE