databaseChangeLog:
  - changeSet:
      id: 001-create-users-table
      author: ft_transcendence

      changes:
        - createTable:
            tableName: users
            schemaName: dev
            columns:
              - column:
                  name: value
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: users
            schemaName: dev
            columnNames: email
            constraintName: uq_users_email