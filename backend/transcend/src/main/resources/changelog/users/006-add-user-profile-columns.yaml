databaseChangeLog:
  - changeSet:
      id: 006-add-user-profile-columns
      author: dev
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: user_details_id
                  type: UUID
                  constraints:
                    nullable: true
                    foreignKeyName: fk_users_user_details
                    references: user_details(val)