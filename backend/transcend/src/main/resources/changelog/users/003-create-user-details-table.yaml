databaseChangeLog:
  - changeSet:
      id: 003-create-user-details-table
      author: ft_transcendence
      changes:
        - createTable:
            tableName: user_details
            columns:
              - column:
                  name: val
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: display_name
                  type: VARCHAR(255)
              - column:
                  name: avatar_id
                  type: UUID
                  constraints:
                    nullable: true
                    foreignKeyName: fk_details_avatar
                    references: avatars(val)
