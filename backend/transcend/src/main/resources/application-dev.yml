spring:
  application:
    name: transcend-backend-dev
  liquibase:
    enabled: true
    change-log: classpath:changelog/db.changelog-master.yaml
    default_schema: dev
    parameters:
      schemaName: dev
  jpa:
    defer-datasource-initialization: false
    properties:
      hibernate:
        default_schema: dev
    hibernate:
      ddl-auto: validate
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:5432/${POSTGRES_DB}?sslmode=disable&currentSchema=dev
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
server:
  port: 5000