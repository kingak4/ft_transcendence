server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # Optional SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";

    # Redirect HTTP requests to HTTPS
    error_page 497 =301 https://$http_host$request_uri;

    # Reverse proxy for the backend API and WebSockets
    location /api/ {
        proxy_pass http://transcend-backend:5000/;
        
        # WebSocket specific headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Inject Authorization header from auth_token cookie
        set $auth_header "";
        if ($cookie_auth_token) {
            set $auth_header "Bearer $cookie_auth_token";
        }
        proxy_set_header Authorization $auth_header;
        
        # Standard forwarding headers
        proxy_set_header Host localhost:8443;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Server localhost;
    }

    # Reverse proxy for the frontend
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host localhost:8443;
        proxy_set_header X-Forwarded-Host localhost:8443;
        proxy_set_header X-Forwarded-Port 8443;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Server localhost;
    }
}